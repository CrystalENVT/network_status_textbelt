  docker_build:
    # needs: pytest
    name: Build, Test, & Publish Development Docker Image
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Build image from Dockerfile
      run: docker build -t docker.io/crystalenvt/network_status_textbelt:${{ github.sha }} .

    - name: Run Trivy vulnerability scanner against built image
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
      with:
        image-ref: 'docker.io/crystalenvt/network_status_textbelt:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Log in to Docker Hub
      uses: docker/login-action@ba754150c9dbbaa912ae0ac3cfba43f84195cef2
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@c3b064c6d7c32446d6bc214ea075f1caad2de35a
      with:
        images: crystalenvt/network_status_textbelt

    - name: Build and push Docker image
      id: push
      uses: docker/build-push-action@83bfd93ab480705a7b99a2ed02765137f5ab55ba
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: crystalenvt/network_status_textbelt:${{ env.BRANCH_NAME }},crystalenvt/network_status_textbelt:${{ env.BRANCH_NAME }}-${{ github.sha }}